<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Semaine 3 – Architecture Transformer</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --correct: #34d399;
    --wrong: #f87171;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .quiz-wrapper { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 1.6rem; color: var(--accent2); margin-bottom: 0.4rem; }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .question-text { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; line-height: 1.6; }
  .question-num { color: var(--accent); margin-right: 0.5rem; }
  .options { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .option-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.7rem 1rem; text-align: left; font-size: 0.92rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; width: 100%; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,106,247,0.08); }
  .option-btn.correct { border-color: var(--correct); background: rgba(52,211,153,0.1); color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.1); color: var(--wrong); }
  .option-btn:disabled { cursor: default; }
  .explanation { margin-top: 1rem; padding: 0.8rem 1rem; background: rgba(124,106,247,0.07); border-left: 3px solid var(--accent); border-radius: 4px; font-size: 0.88rem; color: var(--muted); display: none; line-height: 1.6; }
  .explanation.show { display: block; }
  .score-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; text-align: center; margin-top: 2rem; display: none; }
  .score-bar.show { display: block; }
  .score-num { font-size: 3rem; font-weight: 700; color: var(--accent2); }
  .score-label { color: var(--muted); margin-top: 0.4rem; }
  .reset-btn { margin-top: 1.2rem; background: var(--accent); border: none; color: #fff; padding: 0.7rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
  .reset-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="quiz-wrapper">
  <h1>Quiz – Semaine 3</h1>
  <p class="subtitle">Architecture Transformer approfondie · 10 questions</p>
  <div id="quiz-container"></div>
  <div class="score-bar" id="score-bar">
    <div class="score-num" id="score-display"></div>
    <div class="score-label">Bonne(s) réponse(s) sur 10</div>
    <button class="reset-btn" onclick="resetQuiz()">Recommencer</button>
  </div>
</div>
<script>
const questions = [
  {
    q: "Combien de matrices de projection principales sont nécessaires pour le calcul de la self-attention d'une seule tête ?",
    options: ["1 (W)", "2 (Wq, Wk)", "3 (Wq, Wk, Wv)", "4 (Wq, Wk, Wv, Wo)"],
    answer: 2,
    explanation: "On projette l'entrée sur trois espaces distincts : Query, Key et Value, via trois matrices de poids distinctes."
  },
  {
    q: "Quel composant permet au modèle de regarder différentes parties de l'entrée simultanément sous des angles variés ?",
    options: ["La couche Feedforward", "Le KV Cache", "La Multi-head attention", "Le RMSNorm"],
    answer: 2,
    explanation: "Les têtes multiples permettent de capturer des relations syntaxiques et sémantiques différentes en parallèle."
  },
  {
    q: "Quelle optimisation algorithmique réduit drastiquement la consommation mémoire GPU lors du calcul de l'attention ?",
    options: ["Word2Vec", "FlashAttention", "L'encodage sinusoïdal", "Le Dropout"],
    answer: 1,
    explanation: "FlashAttention optimise les accès mémoire (IO-awareness) entre la mémoire SRAM et HBM du GPU."
  },
  {
    q: "Quelle est la différence fondamentale entre LayerNorm et RMSNorm ?",
    options: ["RMSNorm n'utilise pas la moyenne, ce qui la rend plus rapide", "LayerNorm est plus récente", "RMSNorm nécessite plus de calculs", "LayerNorm ne s'applique qu'aux RNN"],
    answer: 0,
    explanation: "RMSNorm simplifie la normalisation en se basant uniquement sur la racine carrée de la moyenne des carrés, sans calculer la moyenne."
  },
  {
    q: "Que stocke précisément le « KV cache » pour accélérer la génération de texte ?",
    options: ["Les mots déjà générés sous forme de texte", "Les vecteurs Keys et Values des tokens passés", "Les gradients du modèle", "Les scores de probabilité du vocabulaire"],
    answer: 1,
    explanation: "En stockant les K et V, on évite de recalculer l'attention pour tout le passé à chaque nouveau token."
  },
  {
    q: "Combien de têtes d'attention trouve-t-on typiquement dans un modèle comme BERT-base ou GPT-2-small ?",
    options: ["1", "8", "12", "96"],
    answer: 2,
    explanation: "La configuration standard « base » utilise 12 têtes d'attention par couche."
  },
  {
    q: "Quel mécanisme est responsable du traitement simultané (parallèle) des tokens, contrairement aux RNN ?",
    options: ["La récurrence", "La Self-attention", "Le masquage", "La couche de sortie"],
    answer: 1,
    explanation: "Comme il n'y a pas de boucle temporelle, tous les tokens peuvent interagir en une seule opération matricielle."
  },
  {
    q: "Quelle technique divise les matrices Q, K, V en segments plus petits pour augmenter la capacité de modélisation ?",
    options: ["La quantification", "Le mécanisme de têtes (Heads)", "Le pooling", "Le bit-shifting"],
    answer: 1,
    explanation: "On divise la dimension totale (ex: 768) par le nombre de têtes (ex: 12) pour avoir des projections de taille 64."
  },
  {
    q: "Quel composant final convertit les activations internes du Transformer en probabilités sur tout le vocabulaire ?",
    options: ["Le bloc d'attention", "La couche d'embedding", "La Language Modeling Head (LM Head)", "La couche résiduelle"],
    answer: 2,
    explanation: "La tête LM est une couche linéaire suivie d'un softmax projetant vers la taille du dictionnaire."
  },
  {
    q: "Quel est l'avantage principal du Rotary Positional Encoding (RoPE) utilisé dans les modèles modernes (Llama, Phi) ?",
    options: ["Il est plus joli à visualiser", "Il capture mieux les relations de position relatives entre les tokens", "Il supprime le besoin d'embeddings", "Il réduit la taille du vocabulaire"],
    answer: 1,
    explanation: "RoPE applique une rotation complexe aux vecteurs, permettant au modèle de mieux « sentir » la distance relative entre les mots."
  }
];

let answered = 0;
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = 0; score = 0;
  document.getElementById('score-bar').classList.remove('show');

  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q${qi}`;

    const qText = document.createElement('p');
    qText.className = 'question-text';
    qText.innerHTML = `<span class="question-num">${qi + 1}.</span>${q.q}`;
    card.appendChild(qText);

    const opts = document.createElement('ul');
    opts.className = 'options';
    q.options.forEach((opt, oi) => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(qi, oi, btn, card, q));
      li.appendChild(btn);
      opts.appendChild(li);
    });
    card.appendChild(opts);

    const expl = document.createElement('div');
    expl.className = 'explanation';
    expl.id = `expl${qi}`;
    expl.textContent = q.explanation;
    card.appendChild(expl);

    container.appendChild(card);
  });
}

function selectAnswer(qi, selected, btn, card, q) {
  const allBtns = card.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);
  if (selected === q.answer) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    allBtns[q.answer].classList.add('correct');
  }
  document.getElementById(`expl${qi}`).classList.add('show');
  answered++;
  if (answered === questions.length) {
    const bar = document.getElementById('score-bar');
    document.getElementById('score-display').textContent = `${score} / ${questions.length}`;
    bar.classList.add('show');
    bar.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function resetQuiz() { buildQuiz(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

buildQuiz();
</script>
</body>
</html>
